services:
  ai_worker:
    container_name: ai_worker
    image: robotis/ai-worker:1.3.1
    tty: true
    restart: always
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    ipc: host
    environment:
     - DISPLAY=${DISPLAY}
     - QT_X11_NO_MITSHM=1
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - /usr/local/zed/resources/:/usr/local/zed/resources/
      - /usr/local/zed/settings/:/usr/local/zed/settings/
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ${AI_WORKER_WORKSPACE_DIR:-./workspace}:/workspace
      - ${AI_WORKER_SOURCE_DIR:-..}:/root/ros2_ws/src/ai_worker/
      - /var/run/robotis/agent_sockets/ai_worker:/var/run/agent
    privileged: true
